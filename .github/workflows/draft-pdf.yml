name: Draft JOSS PDF

# Compiles paper/paper.md to a PDF on every change so you can preview the JOSS
# submission. The rendered PDF is uploaded as a build artifact.

on:
  push:
    paths:
      - "paper/**"
      - ".github/workflows/draft-pdf.yml"
  workflow_dispatch:

jobs:
  paper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build draft PDF
        uses: openjournals/openjournals-draft-action@master
        with:
          journal: joss
          paper-path: paper/paper.md
      - uses: actions/upload-artifact@v4
        with:
          name: paper
          path: paper/paper.pdf
