name: Release

# Publishes to PyPI via Trusted Publishing (OIDC) when a GitHub Release is
# published. Releasing (rather than a bare tag push) is deliberate: it is also
# what triggers the Zenodo archival webhook, so a single "publish release" action
# does both PyPI upload and DOI minting. No API tokens are stored in the repo.
#
# One-time setup on PyPI: create the project's "pending publisher" pointing at
#   owner:   leonbzt
#   repo:    markinp
#   workflow: release.yml
#   environment: pypi

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/markinp
    permissions:
      id-token: write # required for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Idempotent: re-publishing a release (e.g. to re-trigger Zenodo) will
          # not fail if the version is already on PyPI.
          skip-existing: true
